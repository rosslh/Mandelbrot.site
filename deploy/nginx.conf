server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # gzip text assets; wasm is already compressed
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Long-cache fingerprinted assets. Webpack emits hashed filenames for
    # js/css/wasm/images, so a year of immutable caching is safe.
    location ~* \.(?:js|css|wasm|png|jpe?g|gif|svg|ico|woff2?|ttf|eot|map)$ {
        try_files $uri =404;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # The service worker must never be cached or clients get stuck on an
    # old version.
    location = /service-worker.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    # Extensionless blog/privacy routes (`/privacy-policy`,
    # `/how-mandelbrot-site-was-built`, ...) resolve to their `.html` file.
    location / {
        try_files $uri $uri.html $uri/ =404;
    }
}
